# Ground truth for the seeded sample-repo test fixture.
# Used by `sentinel eval` and `tests/test_eval.py` to measure precision/recall.
#
# Each entry uses fuzzy matching: detector must match exactly,
# file_path and title are substring matches (case-insensitive for title).

# Detectors to exclude from evaluation (dep-audit depends on env, git-hotspots needs git history)
exclude_detectors = ["dep-audit", "git-hotspots"]

# ── Expected true positives ──────────────────────────────────────

