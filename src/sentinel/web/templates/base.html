<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sentinel{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">Sentinel</a>
    <ul class="navbar-nav">
      <li><a href="/runs">Runs</a></li>
    </ul>
    <form method="post" action="/scan" style="margin-left:auto"
          hx-post="/scan" hx-target="#scan-result" hx-swap="innerHTML">
      <button type="submit" class="btn btn-primary btn-sm">Scan Now</button>
    </form>
    <span id="scan-result"></span>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
