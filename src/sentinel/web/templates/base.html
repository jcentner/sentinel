<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sentinel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script>(function(){var t=localStorage.getItem('sentinel-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <svg class="logo-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 6.5v5.5c0 5 3.3 9.7 8 11 4.7-1.3 8-6 8-11V6.5L12 2z" stroke="var(--amber)" stroke-width="1.5" fill="var(--amber-subtle)"/>
          <circle cx="12" cy="11.5" r="2.5" fill="var(--amber)"/>
        </svg>
        Sentinel
      </a>
      <nav class="nav-links">
        <a href="/runs" class="nav-link {{ 'active' if request.url.path.startswith('/runs') }}">Runs</a>
        <a href="/github" class="nav-link {{ 'active' if request.url.path.startswith('/github') }}">Issues</a>
      </nav>
      <div class="header-actions">
        {% set _rp = request.app.state.repo_path %}
        {% if _rp %}
        <span class="repo-indicator" title="{{ _rp }}">{{ _rp.split('/')[-1] if '/' in _rp else _rp }}</span>
        {% endif %}
        <a href="/scan" class="btn btn-accent btn-sm">New Scan</a>
        <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <div id="toast-container" class="toast-container"></div>
  <script src="/static/app.js"></script>
</body>
</html>
