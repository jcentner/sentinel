name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web,detectors,multilang]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/sentinel/ --strict

      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=sentinel --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Eval regression gate
        run: sentinel eval tests/fixtures/sample-repo --json-output > eval-result.json

      - name: Full-pipeline eval (judge replay)
        run: sentinel eval tests/fixtures/sample-repo --full-pipeline --replay-file tests/fixtures/sample-repo/judge-recordings.json --json-output > eval-full-pipeline.json

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload eval result
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: eval-result
          path: |
            eval-result.json
            eval-full-pipeline.json
